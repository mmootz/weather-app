apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weather-route
  namespace: weather-app
spec:
  parentRefs:
  - name: weather-gateway

  hostnames:
  - weather.mattmootz.com

  rules:

  - matches:
    - path:
        type: PathPrefix
        value: /weather

    backendRefs:
    - name: backend
      port: 5000

  - matches:
    - path:
        type: PathPrefix
        value: /

    backendRefs:
    - name: frontend
      port: 80
